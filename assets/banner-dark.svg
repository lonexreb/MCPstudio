<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#151c25"/>
    </linearGradient>
    <linearGradient id="shieldGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="lineGradLeftDk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="lineGradRightDk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGradDark)" rx="8"/>

  <!-- Subtle grid pattern -->
  <line x1="200" y1="0" x2="200" y2="300" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="0" x2="400" y2="300" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#1e293b" stroke-width="0.5" opacity="0.2"/>
  <line x1="800" y1="0" x2="800" y2="300" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
  <line x1="1000" y1="0" x2="1000" y2="300" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>

  <!-- Connection lines from nodes to center -->
  <!-- Left side lines -->
  <line x1="340" y1="90" x2="540" y2="120" stroke="url(#lineGradLeftDk)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="320" y1="150" x2="540" y2="140" stroke="url(#lineGradLeftDk)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="340" y1="210" x2="540" y2="160" stroke="url(#lineGradLeftDk)" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Right side lines -->
  <line x1="660" y1="120" x2="860" y2="90" stroke="url(#lineGradRightDk)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="660" y1="140" x2="880" y2="150" stroke="url(#lineGradRightDk)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="660" y1="160" x2="860" y2="210" stroke="url(#lineGradRightDk)" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Left diamond nodes -->
  <g transform="translate(330,80)">
    <rect width="20" height="20" rx="3" fill="#3b82f6" opacity="0.7" transform="rotate(45,10,10)"/>
  </g>
  <g transform="translate(310,140)">
    <rect width="20" height="20" rx="3" fill="#3b82f6" opacity="0.5" transform="rotate(45,10,10)"/>
  </g>
  <g transform="translate(330,200)">
    <rect width="20" height="20" rx="3" fill="#3b82f6" opacity="0.7" transform="rotate(45,10,10)"/>
  </g>

  <!-- Right diamond nodes -->
  <g transform="translate(850,80)">
    <rect width="20" height="20" rx="3" fill="#14b8a6" opacity="0.7" transform="rotate(45,10,10)"/>
  </g>
  <g transform="translate(870,140)">
    <rect width="20" height="20" rx="3" fill="#14b8a6" opacity="0.5" transform="rotate(45,10,10)"/>
  </g>
  <g transform="translate(850,200)">
    <rect width="20" height="20" rx="3" fill="#14b8a6" opacity="0.7" transform="rotate(45,10,10)"/>
  </g>

  <!-- Center shield/box icon -->
  <g transform="translate(600,140)">
    <!-- Outer shield shape -->
    <path d="M-50,-60 L50,-60 L50,20 L0,60 L-50,20 Z" fill="url(#shieldGradDark)" opacity="0.1" stroke="url(#shieldGradDark)" stroke-width="2" stroke-opacity="0.6"/>
    <!-- Glow effect -->
    <path d="M-50,-60 L50,-60 L50,20 L0,60 L-50,20 Z" fill="none" stroke="url(#shieldGradDark)" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
    <!-- Inner protocol symbol: connected dots -->
    <circle cx="0" cy="-30" r="6" fill="#3b82f6"/>
    <circle cx="-25" cy="5" r="6" fill="#8b5cf6"/>
    <circle cx="25" cy="5" r="6" fill="#14b8a6"/>
    <circle cx="0" cy="30" r="5" fill="#8b5cf6" opacity="0.8"/>
    <!-- Inner connection lines -->
    <line x1="0" y1="-24" x2="-22" y2="1" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="-24" x2="22" y2="1" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
    <line x1="-22" y1="9" x2="0" y2="26" stroke="#14b8a6" stroke-width="2" opacity="0.7"/>
    <line x1="22" y1="9" x2="0" y2="26" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
    <line x1="-25" y1="5" x2="25" y2="5" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="238" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9" letter-spacing="1">MCPStudio</text>

  <!-- Subtitle -->
  <text x="600" y="268" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#94a3b8" letter-spacing="2">THE POSTMAN FOR MODEL CONTEXT PROTOCOL</text>

  <!-- Small decorative dots -->
  <circle cx="430" cy="100" r="2" fill="#3b82f6" opacity="0.25"/>
  <circle cx="770" cy="100" r="2" fill="#14b8a6" opacity="0.25"/>
  <circle cx="450" cy="200" r="2" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="750" cy="200" r="2" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="500" cy="80" r="1.5" fill="#3b82f6" opacity="0.15"/>
  <circle cx="700" cy="80" r="1.5" fill="#14b8a6" opacity="0.15"/>
</svg>
